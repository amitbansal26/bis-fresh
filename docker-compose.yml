version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: bis-postgres
    environment:
      POSTGRES_DB: bisdb
      POSTGRES_USER: bisuser
      POSTGRES_PASSWORD: bispassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: bis-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: bis-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  bis-identity-service:
    image: bis/identity-service:latest
    container_name: bis-identity-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bisdb
      SPRING_DATASOURCE_USERNAME: bisuser
      SPRING_DATASOURCE_PASSWORD: bispassword
    depends_on:
      - postgres
      - kafka

  bis-certification-service:
    image: bis/certification-service:latest
    container_name: bis-certification-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bisdb
      SPRING_DATASOURCE_USERNAME: bisuser
      SPRING_DATASOURCE_PASSWORD: bispassword
    depends_on:
      - postgres
      - kafka

  bis-laboratory-service:
    image: bis/laboratory-service:latest
    container_name: bis-laboratory-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bisdb
      SPRING_DATASOURCE_USERNAME: bisuser
      SPRING_DATASOURCE_PASSWORD: bispassword
    depends_on:
      - postgres
      - kafka

  bis-operations-service:
    image: bis/operations-service:latest
    container_name: bis-operations-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bisdb
      SPRING_DATASOURCE_USERNAME: bisuser
      SPRING_DATASOURCE_PASSWORD: bispassword
    depends_on:
      - postgres
      - kafka

  bis-integration-service:
    image: bis/integration-service:latest
    container_name: bis-integration-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bisdb
      SPRING_DATASOURCE_USERNAME: bisuser
      SPRING_DATASOURCE_PASSWORD: bispassword
    depends_on:
      - postgres
      - kafka

  bis-master-data-service:
    image: bis/master-data-service:latest
    container_name: bis-master-data-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bisdb
      SPRING_DATASOURCE_USERNAME: bisuser
      SPRING_DATASOURCE_PASSWORD: bispassword
    depends_on:
      - postgres
      - kafka

volumes:
  postgres_data:
