apiVersion: apps/v1
kind: Deployment
metadata:
  name: bis-identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bis-identity-service
  template:
    metadata:
      labels:
        app: bis-identity-service
    spec:
      containers:
        - name: bis-identity-service
          image: bis-identity-service:0.0.0
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: bis-platform-config
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bis-platform-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bis-platform-secrets
                  key: SPRING_DATASOURCE_PASSWORD
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bis-identity-service
spec:
  selector:
    app: bis-identity-service
  ports:
    - name: http
      protocol: TCP
      port: 8081
      targetPort: http
---
