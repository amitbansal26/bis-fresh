spring:
  application:
    name: bis-laboratory-service
  datasource:
    url: jdbc:postgresql://localhost:5432/bisdb
    username: bisuser
    password: bispassword
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/bis}

server:
  port: 8083
management:
  endpoints:
    web:
      exposure:
        include: health,info
