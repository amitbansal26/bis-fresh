spring:
  datasource:
    url: jdbc:h2:mem:intdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  security:
    user:
      name: testuser
      password: testpass
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost/mock-jwks
